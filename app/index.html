<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ReqPub · Discovery to Requirements</title>
<meta name="description" content="ReqPub turns structured product discovery into a versioned, shareable requirements document." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='3' width='26' height='26' rx='7' fill='%232563FF'/%3E%3Cpolyline points='14 11 19 16 14 21' fill='none' stroke='%23fff' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0a; --ink-2:#262626; --ink-3:#474747; --ink-4:#606060;
    --line:#ececec; --line-2:#dcdcdc; --bg:#ffffff; --bg-2:#fafafa; --bg-3:#f2f2f2;
    --radius:14px; --radius-sm:10px; --radius-lg:20px;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.045);
    --shadow-sm:0 1px 2px rgba(0,0,0,.05);
    --brand:#2563FF; --brand-600:#1d4ed8; --brand-700:#1e40af; --sky:#e6f0ff; --sky-2:#dbe7ff;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --ease:cubic-bezier(.2,.7,.2,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  button{font-family:inherit;font-size:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;font-size:inherit;color:inherit}
  ::selection{background:#0a0a0a;color:#fff}
  .mono{font-family:var(--mono)}
  a{color:var(--brand);text-decoration:underline;text-underline-offset:2px}

  .btn{display:inline-flex;align-items:center;gap:8px;height:42px;padding:0 18px;border-radius:var(--radius-sm);font-weight:560;letter-spacing:-.01em;transition:transform .14s var(--ease),background .14s var(--ease),border-color .14s var(--ease),box-shadow .14s var(--ease);white-space:nowrap}
  .btn-primary{background:var(--brand);color:#fff}
  .btn-primary:hover{transform:translateY(-1px);background:var(--brand-600);box-shadow:0 6px 18px rgba(37,99,255,.30)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.32;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-sec{background:var(--bg);color:var(--ink);border:1px solid var(--line-2)}
  .btn-sec:hover{background:var(--bg-3);border-color:var(--ink-4)}
  .btn-ghost{color:var(--ink-3);height:38px;padding:0 12px}
  .btn-ghost:hover{color:var(--ink);background:var(--bg-3)}
  .btn-sm{height:34px;padding:0 12px;font-size:13px;border-radius:8px}
  .icobtn{width:36px;height:36px;display:inline-flex;align-items:center;justify-content:center;border-radius:9px;color:var(--ink-3);transition:.14s var(--ease)}
  .icobtn:hover{color:var(--ink);background:var(--bg-3)}
  .icobtn:disabled{opacity:.3;cursor:not-allowed}
  svg.i{width:17px;height:17px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round;display:block}
  svg.i-sm{width:14px;height:14px}

  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3)}
  .pill{display:inline-flex;align-items:center;gap:5px;height:22px;padding:0 9px;border-radius:999px;border:1px solid var(--line-2);font-size:11px;font-weight:560;color:var(--ink-2);letter-spacing:.01em}
  .pill .mono{font-size:11px}
  .pill-solid{background:var(--ink);color:#fff;border-color:var(--ink)}

  .input,.textarea{width:100%;background:var(--bg);border:1px solid var(--line-2);border-radius:var(--radius-sm);padding:11px 13px;transition:border-color .14s var(--ease),box-shadow .14s var(--ease);outline:none}
  .input:focus,.textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,255,.14)}
  .textarea{resize:vertical;line-height:1.6;min-height:104px;field-sizing:content;max-height:60vh}
  /* worksheet inputs: single-line baseline, drag to expand, auto-grow while typing (Chromium) */
  .gta{resize:vertical;min-height:42px;line-height:1.5;white-space:pre-wrap;overflow-x:hidden;field-sizing:content;max-height:50vh}
  .input::placeholder,.textarea::placeholder{color:var(--ink-4)}
  .seg{display:inline-flex;background:var(--bg-3);padding:3px;border-radius:11px;gap:2px}
  .seg button{height:32px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:540;color:var(--ink-3);transition:.14s var(--ease)}
  .seg button.on{background:var(--bg);color:var(--ink);box-shadow:var(--shadow-sm)}
  .choice{display:flex;flex-wrap:wrap;gap:8px}
  .chip{height:40px;padding:0 16px;border-radius:var(--radius-sm);border:1px solid var(--line-2);background:var(--bg);font-weight:520;transition:.14s var(--ease)}
  .chip:hover{border-color:var(--ink-4)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip-sm{height:30px;padding:0 11px;font-size:13px;border-radius:8px}

  .app{display:flex;flex-direction:column;height:100%}
  #root{height:100%}
  .topbar{height:60px;flex:0 0 60px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(255,255,255,.86);backdrop-filter:saturate(140%) blur(10px);position:relative;z-index:5}
  .brandmark{width:26px;height:26px;border-radius:7px;background:var(--brand);display:flex;align-items:center;justify-content:center}
  .brandmark svg{width:15px;height:15px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .split{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);grid-template-rows:minmax(0,1fr);min-height:0}
  .pane-intake{overflow-y:auto;border-right:1px solid var(--line);background:var(--bg)}
  .pane-doc{overflow:hidden;background:var(--bg-2);display:flex;flex-direction:column}
  .fab{display:none}
  @media(max-width:920px){
    .split{grid-template-columns:1fr}
    .pane-doc{display:none}
    .pane-doc.show{display:flex;position:fixed;inset:60px 0 0 0;z-index:25;border-left:none}
    .fab{display:inline-flex;position:fixed;right:18px;bottom:18px;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(37,99,255,.35);z-index:30}
  }

  .ptrack{height:2px;background:var(--line);border-radius:2px;overflow:hidden}
  .pfill{height:100%;background:var(--ink);transition:width .4s var(--ease)}
  .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;border:1.5px solid var(--line-2);box-sizing:border-box}
  .dot.some{background:var(--ink-4);border-color:var(--ink-4)}
  .dot.done{background:var(--ink);border-color:var(--ink)}

  .card{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
  .qcard{padding:30px}
  .row-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px;background:var(--bg-2)}

  .doc-tools{position:sticky;top:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);background:rgba(250,250,250,.9);backdrop-filter:blur(8px);min-height:54px;gap:8px;flex-wrap:wrap}
  .doc-scroll{flex:1;min-height:0;overflow-y:auto}
  .page{max-width:660px;margin:0 auto;padding:40px 40px 80px}
  @media(max-width:520px){ .page{padding:28px 22px 60px} .qcard{padding:22px} }
  .doc-anim{animation:fade .28s var(--ease)}
  .hl{font-weight:700;color:var(--ink);background:var(--sky-2);border-radius:3px;box-shadow:0 0 0 2px var(--sky-2);transition:background .1s}
  @keyframes fade{from{opacity:.55}to{opacity:1}}

  .md h1{font-size:27px;line-height:1.18;letter-spacing:-.022em;font-weight:660;margin:0 0 6px}
  .md .doc-meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-2);letter-spacing:.01em;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px 0;margin:14px 0 8px}
  .md .part{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-3);margin:34px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line-2)}
  .md h2{font-size:18.5px;letter-spacing:-.015em;font-weight:620;margin:26px 0 8px;display:flex;gap:9px;align-items:baseline}
  .md h2 .secn{font-family:var(--mono);font-size:13px;color:var(--ink-3);font-weight:500;flex:0 0 auto}
  .md h3{font-size:14.5px;font-weight:600;color:var(--ink-2);margin:18px 0 6px;display:flex;gap:8px;align-items:baseline}
  .md h3 .secn{font-family:var(--mono);font-size:12px;color:var(--ink-4)}
  .md p{margin:8px 0;color:var(--ink-2);line-height:1.68}
  .md ul,.md ol{margin:8px 0;padding-left:20px;color:var(--ink-2)}
  .md li{margin:4px 0;line-height:1.6}
  .md strong{color:var(--ink);font-weight:620}
  .md code{font-family:var(--mono);font-size:.86em;background:var(--bg-3);padding:1px 5px;border-radius:5px}
  .md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden}
  .md th{text-align:left;font-weight:600;color:var(--ink-2);background:var(--bg-2);padding:8px 11px;border-bottom:1px solid var(--line-2);font-size:11.5px;letter-spacing:.01em;vertical-align:top}
  .md td{padding:8px 11px;border-bottom:1px solid var(--line);color:var(--ink-2);vertical-align:top;line-height:1.5}
  .md tr:last-child td{border-bottom:none}
  .md td.idc,.md th.idc{font-family:var(--mono);font-size:11.5px;white-space:nowrap;color:var(--ink)}
  /* Functional Requirements set apart in the rendered document */
  .md h2#docsec-functional{color:var(--brand)}
  .md h2#docsec-functional .secn{color:var(--brand)}
  .md h2#docsec-functional + table{border:1.5px solid var(--brand);box-shadow:0 0 0 4px var(--sky)}
  .md h2#docsec-functional + table th{background:var(--sky);color:var(--ink)}
  .md h2#docsec-functional + table td.idc{color:var(--brand);font-weight:620}

  .empty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--ink-3)}
  .empty svg{width:40px;height:40px;stroke:var(--line-2);stroke-width:1.4;fill:none;margin-bottom:14px}

  .wrap{max-width:880px;margin:0 auto;padding:64px 28px 80px}
  .pcard{display:block;width:100%;text-align:left;background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:18px;transition:.16s var(--ease)}
  .pcard:hover{transform:translateY(-2px);border-color:var(--ink-4);box-shadow:var(--shadow)}
  .rise{animation:rise .5s var(--ease) both}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .toast{position:fixed;right:18px;bottom:18px;background:var(--ink);color:#fff;font-size:13px;padding:10px 14px;border-radius:10px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:80;animation:rise .25s var(--ease)}
  .umbtn{display:inline-flex;align-items:center;gap:6px;height:38px;padding:3px 9px 3px 3px;border-radius:999px;border:1px solid var(--line-2);background:var(--bg);transition:.14s var(--ease)}
  .umbtn:hover{border-color:var(--ink-4);background:var(--bg-3)}
  .umav{width:30px;height:30px;border-radius:50%;background:var(--brand);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:680;flex:0 0 auto}
  .umav.lg{width:42px;height:42px;font-size:15px}
  .umback{position:fixed;inset:0;z-index:58}
  .umpop{position:fixed;top:56px;right:16px;width:290px;background:#fff;border:1px solid var(--line-2);border-radius:14px;box-shadow:0 16px 44px rgba(15,23,42,.18);z-index:59;overflow:hidden;animation:rise .16s var(--ease)}
  .umhead{display:flex;gap:12px;align-items:flex-start;padding:16px}
  .umname{font-size:14.5px;font-weight:620;letter-spacing:-.01em;line-height:1.2}
  .umsub{font-size:12px;color:var(--ink-4);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
  .umrole{display:inline-flex;font-size:10.5px;font-weight:600;color:var(--brand);background:var(--sky);border:1px solid var(--sky-2);border-radius:999px;padding:2px 8px;letter-spacing:.02em}
  .umsep{height:1px;background:var(--line)}
  .umitem{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 16px;font-size:13.5px;color:var(--ink-2);background:none;border:none;cursor:pointer;transition:.12s;font-family:inherit}
  .umitem:hover{background:var(--bg-3);color:var(--ink);text-decoration:none}
  .umitem svg.i{width:16px;height:16px;color:var(--ink-4)}
  .umitem.danger{color:#b42318}
  .umitem.danger svg.i{color:#b42318}
  .modal-back{position:fixed;inset:0;background:rgba(10,10,10,.45);display:flex;align-items:center;justify-content:center;padding:22px;z-index:65}
  .modal-card{background:#fff;border-radius:18px;max-width:480px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 70px rgba(0,0,0,.3);padding:24px}
  .modal-card h3{margin:0;font-size:19px;font-weight:680;letter-spacing:-.02em}
  .fldlabel{font-size:12px;font-weight:560;color:var(--ink-3);margin:14px 0 6px}
  .modal-x{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-3);background:none;border:none;cursor:pointer;flex:0 0 auto}
  .modal-x:hover{background:var(--bg-3);color:var(--ink)}
  .acctchip{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px 0 4px;border-radius:999px;border:1px solid var(--line-2);background:var(--bg);font-size:13px;font-weight:560;color:var(--ink);cursor:pointer;transition:.14s var(--ease)}
  .acctchip:hover{background:var(--bg-3);border-color:var(--ink-4)}
  .acctdot{width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:680;flex:0 0 auto}
  .hint{font-size:12.5px;color:var(--ink-3);line-height:1.55}
  .lbl{font-size:13px;font-weight:560;color:var(--ink);margin-bottom:5px;display:block}
  .seclbl{display:flex;align-items:center;gap:9px;padding-bottom:9px;border-bottom:1px solid var(--line);margin-bottom:16px}
  hr.sep{border:none;border-top:1px solid var(--line);margin:0}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

  #printArea{display:none}
  .rp-cover{border-bottom:2.5px solid var(--brand);padding-bottom:16px;margin-bottom:26px}
  .rp-cover .rp-brand{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .rp-cover .rp-brand .brandmark{width:30px;height:30px;border-radius:8px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rp-cover .rp-word{font-size:19px;font-weight:680;letter-spacing:-.02em;color:var(--ink)}
  .rp-cover .rp-title{font-size:30px;font-weight:680;letter-spacing:-.025em;line-height:1.1;margin:2px 0;color:var(--ink)}
  .rp-cover .rp-org{font-size:14px;color:var(--ink-3);margin-top:4px}
  .rp-cover .rp-meta{font-family:var(--mono);font-size:11.5px;color:var(--ink-3);margin-top:12px;letter-spacing:.01em}
  @media print{
    body *{visibility:hidden}
    #printArea,#printArea *{visibility:visible}
    #printArea{display:block;position:absolute;inset:0;padding:0}
    .page{padding:0;max-width:none}
    .rp-cover{break-after:avoid}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .md .part{color:var(--brand)!important}
    .md h2 .secn,.md h3 .secn,.md td.idc{color:var(--brand)!important}
    .md th{background:#eef3ff!important}
    .md table{break-inside:auto} .md tr{break-inside:avoid}
    .md h2,.md h3,.md .part{break-after:avoid}
  }
</style>
</head>
<body>
<div id="root"></div>
<div id="printArea"></div>
<script src="/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   BACKEND CONFIG. Leave blank to run locally as before.
   Paste your Supabase Project URL and anon (public) key to go multi-user.
   ============================================================ */
var SB_CFG = (window.SB_CFG || { url: '', anon: '' });

/* STORAGE: in-memory cache, mirrored to localStorage, synced to Supabase when configured */
var _mem={};
var DB={
  get:function(k){ if(k in _mem) return _mem[k]; try{var v=localStorage.getItem(k); if(v!=null){var p=JSON.parse(v); _mem[k]=p; return p;}}catch(e){} return null; },
  set:function(k,v){ _mem[k]=v; try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} if(SB_ON)sbPush(k,v); },
  del:function(k){ delete _mem[k]; try{localStorage.removeItem(k);}catch(e){} if(SB_ON)sbDelKey(k); }
};

/* ===== Supabase layer (active only when SB_CFG is filled) ===== */
var SB=null, SB_ON=false, SB_DIRTY={}, SB_TIMER=null, SB_ORG=null;
function sbInit(){ try{ if(SB_CFG.url && SB_CFG.anon && window.supabase){ SB=window.supabase.createClient(SB_CFG.url, SB_CFG.anon); SB_ON=true; } }catch(e){ SB_ON=false; } return SB_ON; }
function sbPush(k,v){ if(!SB_ON||!SB_ORG||APP.role==='Viewer')return; SB_DIRTY[k]={v:v,del:false}; sbFlushSoon(); }
function sbDelKey(k){ if(!SB_ON||!SB_ORG||APP.role==='Viewer')return; SB_DIRTY[k]={v:null,del:true}; sbFlushSoon(); }
function sbFlushSoon(){ if(SB_TIMER)return; SB_TIMER=setTimeout(sbFlush,600); }
function sbFlush(){
  SB_TIMER=null; if(!SB_ON||!SB_ORG)return;
  var keys=Object.keys(SB_DIRTY); if(!keys.length)return;
  var ups=[], dels=[];
  keys.forEach(function(k){ var d=SB_DIRTY[k]; if(d.del)dels.push(k); else ups.push({org_id:SB_ORG,key:k, value:d.v}); });
  SB_DIRTY={};
  if(ups.length){ try{ SB.from('kv').upsert(ups,{onConflict:'org_id,key'}).then(function(r){ if(r&&r.error)console.warn('kv upsert',r.error.message); }); }catch(e){} }
  dels.forEach(function(k){ try{ SB.from('kv').delete().eq('org_id',SB_ORG).eq('key',k).then(function(){}); }catch(e){} });
}
function sbHydrate(cb){
  if(!SB_ON||!SB_ORG){ cb&&cb(); return; }
  SB.from('kv').select('key,value').eq('org_id',SB_ORG).then(function(res){
    if(res&&res.data){ res.data.forEach(function(r){ _mem[r.key]=r.value; }); }
    sbPullSubmissions(function(){ sbPullPartnerNotes(function(){ cb&&cb(); }); });
  });
}
function sbPullSubmissions(cb){
  if(!SB_ON){ cb&&cb(); return; }
  SB.from('submissions').select('id,kind,payload').then(function(res){
    try{
      if(res&&res.data&&res.data.length){
        res.data.forEach(function(s){
          var p=s.payload||{}; var pid=p.project_id;
          if(!pid||!p.record)return;
          var key='rm:proj:'+pid+':'+(s.kind==='note'?'notes':'feedback');
          var arr=_mem[key]||[];
          if(!arr.some(function(x){return x.id===s.id;})){
            var rec=p.record; rec.id=s.id; arr.unshift(rec); _mem[key]=arr;
            try{localStorage.setItem(key,JSON.stringify(arr));}catch(e){}
          }
        });
      }
    }catch(e){}
    cb&&cb();
  });
}
function sbShareGet(token,cb){ if(!SB_ON){cb(null);return;} try{ SB.rpc('get_share',{p_token:token}).then(function(r){ cb(r&&!r.error?r.data:null); }); }catch(e){ cb(null); } }
function sbShareSubmit(token,kind,payload,cb){ if(!SB_ON){cb(false);return;} try{ SB.rpc('submit_share_feedback',{p_token:token,p_kind:kind,p_payload:payload}).then(function(r){ cb(!!(r&&!r.error&&r.data)); }); }catch(e){ cb(false); } }
function sbSharePut(token,kind,pid,seq,payload){ if(!SB_ON)return; try{ SB.from('shares').upsert({token:token,kind:kind,project_id:pid,version_seq:seq,payload:payload,revoked:false},{onConflict:'token'}).then(function(r){ if(r&&r.error)console.warn('share put',r.error.message); }); }catch(e){} }
function sbSyncProjectShares(pid){ if(!SB_ON||!pid)return; try{ var vs=DB.get('rm:proj:'+pid+':versions')||[]; vs.forEach(function(v){ sbSharePut(briefToken(pid,v.seq),'brief',pid,v.seq,buildSharePayload(pid,v.seq,'brief')); sbSharePut(fbToken(pid,v.seq),'pilot',pid,v.seq,buildSharePayload(pid,v.seq,'pilot')); }); (noteReqsGet(pid)||[]).forEach(function(q){ sbSharePut(noteToken(pid,q.id),'note',pid,0,noteReqPayload(pid,q)); }); }catch(e){} }
function sbSendInvite(email,role){ if(!SB_ON||!email)return; try{ SB.functions.invoke('send-invite',{body:{email:email,role:role,orgName:APP.org||'',inviterEmail:(APP.user&&APP.user.email)||''}}).then(function(fr){ if(fr&&fr.error){ toast('Invited '+email+' (email not sent — deploy the send-invite function)'); } else { toast('Invitation emailed to '+email); } },function(){ toast('Invited '+email+' (email not sent yet)'); }); }catch(e){} }
function sbPullPartnerNotes(cb){
  if(!SB_ON||!SB_ORG){ cb&&cb(); return; }
  try{ SB.from('partner_notes').select('id,project_id,name,text,created_at').then(function(res){
    try{ if(res&&res.data&&res.data.length){ res.data.forEach(function(s){
      var key='rm:proj:'+s.project_id+':notes'; var arr=_mem[key]||[];
      if(!arr.some(function(x){return x.id===s.id;})){
        arr.unshift({id:s.id,at:s.created_at,text:s.text||'',source:'Partner',by:s.name||'Partner',status:'Inbox',task:false,done:false,owner:''});
        _mem[key]=arr; try{localStorage.setItem(key,JSON.stringify(arr));}catch(e){}
      }
    }); } }catch(e){}
    cb&&cb();
  }); }catch(e){ cb&&cb(); }
}
function sbResolveContext(cb){
  if(!SB_ON){ cb&&cb('none'); return; }
  SB.rpc('claim_invites').then(function(){
    SB.rpc('my_context').then(function(r){
      var row=(r&&r.data&&r.data[0])||null;
      if(row){ SB_ORG=row.org_id; APP.org=row.org_name; APP.role=(row.role==='manager')?'Manager':'Viewer'; APP.isPartner=false; loadMyOrgs(); cb&&cb('member'); return; }
      SB.from('partners').select('id,org_id,name').then(function(pr){
        var p=(pr&&pr.data&&pr.data[0])||null;
        if(p){ APP.isPartner=true; APP.partner=p; APP.role='Partner'; SB_ORG=null; cb&&cb('partner'); }
        else { APP.role=null; SB_ORG=null; cb&&cb('none'); }
      });
    });
  });
}
function routeByContext(kind){
  APP.unlocked=true;
  if(kind==='member'){ sbHydrate(function(){ APP.view='projects'; APP.pid=null; render(); }); }
  else if(kind==='partner'){ APP.view='partner'; render(); loadPartnerProjects(); }
  else { APP.view='noorg'; render(); }
}
function loadPartnerProjects(){
  if(!SB_ON)return;
  try{ SB.rpc('partner_projects').then(function(r){ APP.partnerProjects=(r&&r.data)||[]; if(APP.view==='partner'||APP.view==='partnerview')render(); }); }catch(e){}
}
function doCreateOrg(name){
  if(!SB_ON)return; APP.authBusy=true; APP.authError=null; render();
  try{ SB.rpc('create_org',{p_name:name||'My workspace'}).then(function(r){
    APP.authBusy=false;
    if(r&&r.error){ APP.authError='Could not create workspace: '+r.error.message; render(); return; }
    sbResolveContext(function(kind){ routeByContext(kind); });
  }); }catch(e){ APP.authBusy=false; render(); }
}

function loadMyOrgs(){
  if(!SB_ON||!APP.user)return;
  try{ SB.from('org_members').select('org_id,role').eq('user_id',APP.user.id).then(function(mr){
    var ms=(mr&&mr.data)||[];
    SB.from('orgs').select('id,name').then(function(orr){
      var names={}; ((orr&&orr.data)||[]).forEach(function(o){names[o.id]=o.name;});

      if(APP.menuOpen)render();
    });
  }); }catch(e){}
}
function loadOrgPartners(){
  if(!SB_ON||!SB_ORG)return;
  try{ SB.from('partners').select('id,email,name').then(function(pr){
    var ps=(pr&&pr.data)||[];

    });
  }); }catch(e){}
}

  return '| '+headers.join(' | ')+' |\n| '+headers.map(function(){return '---';}).join(' | ')+' |\n'+

  mp.push('Version '+(label||'Draft')); mp.push('Status '+(a.ctrl_status||'Draft')); mp.push(new Date().toLocaleDateString()); mp.push('Owner '+(a.ctrl_owner||'to confirm'));

/* MARKDOWN -> HTML */
function inlineMd(t){
  t=esc(t);
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\[\[hl\]\]/g,'<span class="hl">').replace(/\[\[\/hl\]\]/g,'</span>');
  return t;
}
function secNum(txt){
  var m=/^(\d+(?:\.\d+)?)\.\s+([\s\S]*)$/.exec(txt);
  if(m)return '<span class="secn">'+m[1]+'</span><span>'+inlineMd(m[2])+'</span>';
  return inlineMd(txt);
}
function mdToHtml(md){
  if(!md)return '';
  var lines=md.replace(/\r/g,'').split('\n'),out=[],i=0;
  while(i<lines.length){
    var line=lines[i];
    if(!line.trim()){i++;continue;}
    if(line.indexOf('<meta>')===0){out.push('<div class="doc-meta">'+esc(line.replace(/<\/?meta>/g,''))+'</div>');i++;continue;}
    if(line.trim().charAt(0)==='|'){
      var tb=[]; while(i<lines.length&&lines[i].trim().charAt(0)==='|'){tb.push(lines[i]);i++;}
      var cells=function(r){var x=r.trim().replace(/^\|/,'').replace(/\|$/,'').split('|');return x.map(function(c){return c.trim();});};
      var head=cells(tb[0]),body=tb.slice(2).map(cells);
      var idCol=head[0]==='ID';
      var th='<tr>'+head.map(function(h,c){return '<th'+(idCol&&c===0?' class="idc"':'')+'>'+inlineMd(h)+'</th>';}).join('')+'</tr>';
      var tr=body.map(function(r){return '<tr>'+head.map(function(_,c){return '<td'+(idCol&&c===0?' class="idc"':'')+'>'+inlineMd(r[c]||'')+'</td>';}).join('')+'</tr>';}).join('');
      out.push('<table><thead>'+th+'</thead><tbody>'+tr+'</tbody></table>');
      continue;
    }
    if(line.indexOf('## Part ')===0){out.push('<div class="part">'+esc(line.slice(3))+'</div>');i++;continue;}
    if(line.indexOf('# ')===0){out.push('<h1 id="docsec-control">'+inlineMd(line.slice(2))+'</h1>');i++;continue;}
    if(line.indexOf('## ')===0){var _ht=line.slice(3);var _nm=/^(\d+)\./.exec(_ht);var _sid=(_nm&&SECNUM2KEY[+_nm[1]])?(' id="docsec-'+SECNUM2KEY[+_nm[1]]+'"'):'';out.push('<h2'+_sid+'>'+secNum(_ht)+'</h2>');i++;continue;}
    if(line.indexOf('### ')===0){out.push('<h3>'+secNum(line.slice(4))+'</h3>');i++;continue;}
    if(/^\s*-\s+/.test(line)){var li=[];while(i<lines.length&&/^\s*-\s+/.test(lines[i])){li.push(lines[i].replace(/^\s*-\s+/,''));i++;}out.push('<ul>'+li.map(function(x){return '<li>'+inlineMd(x)+'</li>';}).join('')+'</ul>');continue;}
    if(/^\s*\d+\.\s+/.test(line)){var lo=[];while(i<lines.length&&/^\s*\d+\.\s+/.test(lines[i])){lo.push(lines[i].replace(/^\s*\d+\.\s+/,''));i++;}out.push('<ol>'+lo.map(function(x){return '<li>'+inlineMd(x)+'</li>';}).join('')+'</ol>');continue;}
    var par=[];while(i<lines.length&&lines[i].trim()&&!/^[#|]/.test(lines[i])&&lines[i].indexOf('<meta>')!==0&&!/^\s*-\s+/.test(lines[i])&&!/^\s*\d+\.\s+/.test(lines[i])){par.push(lines[i]);i++;}
    out.push('<p>'+inlineMd(par.join(' '))+'</p>');
  }
  return '<div class="md">'+out.join('')+'</div>';
}

function bFeedback(pid){
  var all=fbGet(pid); if(!all.length)return null;
  var byVer={}; all.forEach(function(x){(byVer[x.seq]=byVer[x.seq]||[]).push(x);});
  var seqs=Object.keys(byVer).map(Number).sort(function(a,b){return b-a;});
  var p=['## Appendix C. Pilot Feedback'];
  p.push('All feedback received during pilot testing, grouped by the version it was filed against. '+all.length+' total.');
  seqs.forEach(function(s){
    var items=byVer[s].slice().sort(function(a,b){return new Date(b.at)-new Date(a.at);});
    var label=items[0].label||('seq '+s);
    p.push('### v'+label+' — '+items.length+' report'+(items.length===1?'':'s'));
    items.forEach(function(x){
      var meta=['PRD: v'+(x.label||'')];
      if(x.build&&x.build.trim())meta.push('Build: '+x.build);
      meta.push('Type: '+x.type);
      if(x.verdict)meta.push('Read: '+x.verdict);
      if(x.severity)meta.push('Severity: '+x.severity);
      if(x.area)meta.push('Area: '+x.area);
      meta.push('Status: '+x.status);
      var who=x.name+(x.email?' ('+x.email+')':'');
      var b='**'+x.title+'**\n\n'+meta.join('  ·  ')+'\n\n'+who+'  ·  '+fmtDate(x.at)+'\n\n'+x.detail;
      if(x.steps&&x.steps.trim())b+='\n\nSteps to reproduce:\n\n'+x.steps;
      var tri=[]; if(x.assignee&&x.assignee.trim())tri.push('Owner: '+x.assignee);
      if(tri.length)b+='\n\n'+tri.join('  ·  ');
      var ns=x.notes&&x.notes.length?x.notes:(x.note&&x.note.trim()?[{author:(x.assignee||'Team'),at:x.at,text:x.note}]:[]);
      if(ns.length)b+='\n\nInternal notes:\n'+ns.map(function(n){return '- '+(n.author||'Team')+((n.assignee&&n.assignee.trim())?(' -> '+n.assignee):'')+' ('+fmtDate(n.at)+'): '+n.text;}).join('\n');
      p.push(b);
    });
  });
  return p.join('\n\n');
}

function bDiscovery(pid){
  if(!discExportOn(pid))return null;
  var all=discGet(pid); if(!all.length)return null;
  var p=['## Appendix D. Discovery Summary'];
  p.push('Decisions and takeaways from product discovery conversations. Raw notes are omitted. '+all.length+' logged.');
  all.forEach(function(e){
    var meta=[];
    if(e.source)meta.push('Source: '+e.source+(e.who?(' ('+e.who+')'):''));
    meta.push('Status: '+(e.status||'Open'));
    meta.push(fmtDate(e.at));
    if(e.author)meta.push('Logged by '+e.author);
    var b='**'+(e.takeaway||'(untitled)')+'**\n\n'+meta.join('  ·  ');
    var dec=discLines(e.decided); if(dec.length)b+='\n\nDecided:\n'+dec.map(function(x){return '- '+x;}).join('\n');
    var op=discLines(e.open); if(op.length)b+='\n\nStill open:\n'+op.map(function(x){return '- '+x;}).join('\n');
    var lk=discLinkList(e.links); if(lk.length)b+='\n\nInformed: '+lk.join(', ');
    p.push(b);
  });
  return p.join('\n\n');
}

function relTime(iso){
  var t=new Date(iso).getTime(),d=Math.max(0,Date.now()-t);
  var m=Math.floor(d/60000),h=Math.floor(d/3600000),dd=Math.floor(d/86400000);
  if(m<1)return 'just now'; if(m<60)return m+(m===1?' min ago':' min ago'); if(h<24)return h+(h===1?' hour ago':' hours ago'); if(dd<14)return dd+(dd===1?' day ago':' days ago');
  return new Date(iso).toLocaleDateString();
}
function reqDiff(prev,cur){
  var groups=[['fr','FR'],['nfr','NFR'],['eval','EVAL'],['interfaces','IR']];
  var added=[],modified=[],removed=[];
  var has=function(r){return Object.keys(r||{}).some(function(k){return k!=='_k'&&k!=='comp'&&r[k]&&String(r[k]).trim();});};
  var sig=function(r){var o={};Object.keys(r||{}).forEach(function(k){if(k!=='_k')o[k]=r[k];});return JSON.stringify(o);};
  groups.forEach(function(g){
    var pa={},ca={};
    (prev[g[0]]||[]).forEach(function(r){if(r&&r._k!=null&&has(r))pa[r._k]=sig(r);});
    (cur[g[0]]||[]).forEach(function(r){if(r&&r._k!=null&&has(r))ca[r._k]=sig(r);});
    Object.keys(ca).forEach(function(k){var id=g[1]+'-'+String(k).padStart(3,'0');if(!(k in pa))added.push(id);else if(pa[k]!==ca[k])modified.push(id);});
    Object.keys(pa).forEach(function(k){if(!(k in ca))removed.push(g[1]+'-'+String(k).padStart(3,'0'));});
  });
  return {added:added,modified:modified,removed:removed};
}

function revealActiveSection(smooth,force){
  if(!APP.activeSec||APP.view!=='workspace'||APP.docTab!=='document')return;
  var sc=document.getElementById('docScroll'); if(!sc)return;
  var target=sc.querySelector?sc.querySelector('.hl'):null;
  if(target&&(!target.getBoundingClientRect||!target.getBoundingClientRect().height))target=null;
  if(!target)target=document.getElementById('docsec-'+APP.activeSec);
  if(!target)return;
  var scRect=sc.getBoundingClientRect(), tRect=target.getBoundingClientRect();
  var vh=scRect.height, topRel=tRect.top-scRect.top;
  if(!force&&topRel>=vh*0.15&&topRel<=vh*0.7)return;
  var half=Math.min(tRect.height,vh*0.5)/2;
  var dest=sc.scrollTop+topRel+half-vh/2;
  var max=(sc.scrollHeight||0)-vh; if(max<0)max=0; if(dest<0)dest=0; if(dest>max)dest=max;
  if(smooth&&sc.scrollTo){try{sc.scrollTo({top:dest,behavior:'smooth'});}catch(e){sc.scrollTop=dest;}}
  else{sc.scrollTop=dest;}
}
function refreshDoc(){

}

function seedExample(name,raw,makeV1,note,changedKeys,v2author){
  var id=uid();
  var full=normalizeSample(raw);
  var v1ans=makeV1(JSON.parse(JSON.stringify(full)));
  var base=Date.now();
  var v1meta={seq:1,label:'1.0',createdAt:new Date(base-86400000).toISOString(),author:'Micah Canfield',note:'Initial baseline',changed:SECTIONS.map(function(s){return s.key;})};
  var v2meta={seq:2,label:'1.1',createdAt:new Date(base).toISOString(),author:v2author||'Micah Canfield',note:note,changed:changedKeys};
  var v1sec=buildSections(v1ans,'1.0',[v1meta]);
  var v2sec=buildSections(full,'1.1',[v1meta,v2meta]);
  var meta={id:id,name:name,createdAt:v1meta.createdAt,updatedAt:v2meta.createdAt,latestSeq:2,latestLabel:'1.1',seeded:true};
  DB.set('rm:proj:'+id+':meta',meta);
  DB.set('rm:proj:'+id+':answers',full);
  DB.set('rm:proj:'+id+':versions',[v1meta,v2meta]);
  DB.set('rm:proj:'+id+':ver:1',{sections:v1sec,answersSnapshot:v1ans});
  DB.set('rm:proj:'+id+':ver:2',{sections:v2sec,answersSnapshot:full});
  indexSet([meta].concat(indexGet()));
  return id;
}

  var rmId=seedExample('RecordMade',SAMPLE_RM,function(a){a.fr=a.fr.slice(0,7);return a;},'Added governance template library requirement',['functional'],'Erik Companhone');

  fbSet(rmId,[
    {id:'fseed1',seq:2,label:'1.1',at:new Date(now-6*3600000).toISOString(),name:'Dana Whitfield',email:'Pilot attorney',type:'Bug',severity:'Critical',area:'E-Signature',title:'Sealing fails on large operating agreements',detail:'Uploaded a 60 page operating agreement and the seal step spun, then errored. A short consent sealed fine. I expected it to either seal or tell me the file is too large.',steps:'1. Open a 60 page PDF\n2. Sign it\n3. Press seal\n4. Error after about 20 seconds',status:'New',assignee:'',note:''},

/* INIT */
function hardReset(){
  var RESET_VER=1;
  if(DB.get('rm:reset')===RESET_VER)return;
  try{var ks=[],i;for(i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('rm:')===0)ks.push(k);}for(i=0;i<ks.length;i++)localStorage.removeItem(ks[i]);}catch(e){}
  for(var mk in _mem){if(_mem.hasOwnProperty(mk)&&mk.indexOf('rm:')===0)delete _mem[mk];}
  DB.set('rm:reset',RESET_VER);
}
sbInit();
window.addEventListener('hashchange',route);
window.addEventListener('storage',function(e){
  if(!e||!e.key)return;
  if(APP.pid&&e.key===('rm:proj:'+APP.pid+':feedback')&&APP.view==='workspace'&&APP.docTab==='feedback'){refreshDoc();}
});
if(SB_ON){
  try{ SB.auth.onAuthStateChange(function(ev){ if(ev==='SIGNED_OUT'){ _mem={}; APP.user=null; APP.unlocked=false; APP.pid=null; location.replace('/login/'); } }); }catch(e){}
  SB.auth.getSession().then(function(res){
    var sess=res&&res.data&&res.data.session;
    var rr=parseHash();
    if(rr&&(rr.mode==='fb'||rr.mode==='brief'||rr.mode==='note')){ route(); return; }
    if(sess){ APP.user=sess.user; sbResolveContext(function(kind){ routeByContext(kind); }); }
    else { location.replace('/login/'); }
  });
}else{
  hardReset();
  runSeeds();
  APP.author=DB.get('rm:editor')||'';
  APP.org=DB.get('rm:workspace')||'';
  APP.unlocked=DB.get('rm:access')==='1';
  route();
}
</script>
